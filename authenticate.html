<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSAuto</title>
    <link rel="stylesheet" href="authenticate.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body>
    <div class="page-content">
        <div class="return-button">
            <a href="index.html"><i class="fa-solid fa-caret-left"></i></a>
            Return to homepage
        </div>
        <div class="login-panel">
            <h1>Enter username and password for console access.</h1>
            <form action="" class="login-panel-form">
                <div class="credentials">
                    <label for="username">username</label>
                    <input type="text" id="username" name="username">

                    <label for="password">password</label>
                    <input type="password" id="password" name="password">

                </div>
            </form>
            <button type="submit">sign in</button>
            <a href="">forgot password?</a>
        </div>
        
    </div>
</body>
